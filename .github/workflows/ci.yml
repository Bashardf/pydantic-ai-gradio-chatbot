name: CI

on:
  push:
    branches: [ main, repo-final-polish ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Secret scan
        run: python scripts/check_secrets.py

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-fake-not-real-key12345
          MODEL_NAME: test
          SKIP_CONFIG_VALIDATION: "1"
          PYTHONPATH: .
        run: |
          pytest tests/test_health.py
