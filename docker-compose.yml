services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app/storage:/app/app/storage
    restart: unless-stopped

  gradio:
    build: .
    command: python -m app.gradio_app
    ports:
      - "7860:7860"
    env_file:
      - .env
    volumes:
      - ./app/storage:/app/app/storage
    depends_on:
      - api
    restart: unless-stopped
